<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Perfum</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --off-white: #f7f4f0;
    --gold: #b8955a;
    --gold-light: #d4b483;
    --muted: #8a8078;
    --card-bg: #ffffff;
    --border: #e8e2da;
    --hover: #f2ede6;
    --tag-women: #c9a8c0;
    --tag-men: #8aabb5;
    --tag-unisex: #a8b89a;
  }

  body {
    background: var(--off-white);
    color: var(--black);
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: normal;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--black);
    color: var(--off-white);
    padding: 40px 24px 32px;
    text-align: center;
    border-bottom: 1px solid #222;
  }
  header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: normal;
    letter-spacing: 0.18em;
    color: var(--gold-light);
  }
  header p {
    margin-top: 6px;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* SEARCH */
  .search-bar {
    max-width: 560px;
    margin: 28px auto 0;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 2px;
    color: var(--off-white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 12px 44px 12px 16px;
    outline: none;
    letter-spacing: 0.04em;
  }
  .search-bar input::placeholder { color: #555; }
  .search-bar input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: #555; font-size: 16px; pointer-events: none;
  }

  /* LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

  /* BRAND GRID */
  .brands-section { padding: 36px 0 24px; }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .brand-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .brand-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 16px;
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--black);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .brand-btn:hover { background: var(--hover); border-color: var(--gold); color: var(--gold); }
  .brand-btn.active { background: var(--black); border-color: var(--black); color: var(--gold-light); }

  /* GENDER FILTER */
  .gender-bar {
    display: none; gap: 0; margin: 20px 0 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    width: fit-content;
  }
  .gender-bar.visible { display: flex; }
  .gender-btn {
    padding: 10px 28px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none;
    background: var(--card-bg);
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
  }
  .gender-btn + .gender-btn { border-left: 1px solid var(--border); }
  .gender-btn:hover { background: var(--hover); color: var(--black); }
  .gender-btn.active { background: var(--black); color: var(--gold-light); }

  /* PERFUME GRID */
  .perfume-section { display: none; padding-top: 24px; }
  .perfume-section.visible { display: block; }
  .selected-brand-name {
    font-family: Georgia, serif;
    font-size: clamp(22px, 3vw, 32px);
    font-weight: normal;
    letter-spacing: 0.1em;
    color: var(--black);
    margin-bottom: 4px;
  }
  .count-label { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 20px; }

  .perfume-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .perfume-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 18px 20px;
    transition: all 0.18s;
    cursor: default;
  }
  .perfume-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: var(--gold); transform: translateY(-1px); }
  .perfume-name {
    font-family: Georgia, serif;
    font-size: 16px;
    font-weight: normal;
    color: var(--black);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .gender-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 1px;
    margin-bottom: 12px;
  }
  .tag-women { background: #f5eef3; color: #7d5470; }
  .tag-men { background: #edf2f5; color: #3a6575; }
  .tag-unisex { background: #f0f3ee; color: #4a6040; }

  .shop-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .shop-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 1px;
    transition: all 0.15s;
  }
  .shop-link:hover { color: var(--gold); border-color: var(--gold); background: #fdf9f4; }
  .shop-link svg { width: 11px; height: 11px; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; color: var(--muted); letter-spacing: 0.1em;
  }

  /* BACK BTN */
  .back-btn {
    display: none; align-items: center; gap: 8px;
    background: none; border: none; cursor: pointer;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); padding: 0; margin-bottom: 20px;
    transition: color 0.15s;
  }
  .back-btn.visible { display: inline-flex; }
  .back-btn:hover { color: var(--black); }

  /* SEARCH RESULTS */
  .search-results-section { display: none; padding-top: 24px; }
  .search-results-section.visible { display: block; }

  @media (max-width: 600px) {
    header { padding: 28px 16px 24px; }
    .container { padding: 0 16px 60px; }
    .brand-btn { font-size: 13px; padding: 7px 12px; }
    .perfume-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>
  <h1>Katalog Perfum</h1>
  <p>Wybierz markę · Wybierz dla kogo · Odkryj</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Szukaj perfumu lub marki..." autocomplete="off">
    <span class="search-icon">⌕</span>
  </div>
</header>

<div class="container">
  <div class="brands-section">
    <p class="section-label">Marki</p>
    <div class="brand-grid" id="brandGrid"></div>
  </div>

  <div class="gender-bar" id="genderBar">
    <button class="gender-btn active" data-gender="all" onclick="filterGender('all', this)">Wszystkie</button>
    <button class="gender-btn" data-gender="women" onclick="filterGender('women', this)">Kobieta</button>
    <button class="gender-btn" data-gender="men" onclick="filterGender('men', this)">Mężczyzna</button>
    <button class="gender-btn" data-gender="unisex" onclick="filterGender('unisex', this)">Unisex</button>
  </div>

  <button class="back-btn" id="backBtn" onclick="goBack()">
    ← Wszystkie marki
  </button>

  <div class="perfume-section" id="perfumeSection">
    <div class="selected-brand-name" id="selectedBrandName"></div>
    <div class="count-label" id="countLabel"></div>
    <div class="perfume-grid" id="perfumeGrid"></div>
  </div>

  <div class="search-results-section" id="searchResultsSection">
    <p class="section-label">Wyniki wyszukiwania</p>
    <div class="perfume-grid" id="searchGrid"></div>
  </div>
</div>

let activeBrand = null;
let activeGender = 'all';

function makeSearchQuery(brand, name) {
  return encodeURIComponent(brand + ' ' + name);
}

function douglasLink(brand, name) {
  return 'https://www.douglas.pl/pl/search?q=' + makeSearchQuery(brand, name);
}

function sephoraLink(brand, name) {
  return 'https://www.sephora.pl/search?q=' + makeSearchQuery(brand, name);
}

function genderLabel(g) {
  if (g === 'women') return '<span class="gender-tag tag-women">Kobieta</span>';
  if (g === 'men') return '<span class="gender-tag tag-men">Mężczyzna</span>';
  return '<span class="gender-tag tag-unisex">Unisex</span>';
}

function renderBrands() {
  const grid = document.getElementById('brandGrid');
  const brands = Object.keys(data).sort((a,b) => a.localeCompare(b, 'pl'));
  grid.innerHTML = brands.map(b =>
    `<button class="brand-btn" onclick="selectBrand('${b.replace(/'/g,"\\'")}', this)">${b}</button>`
  ).join('');
}

function selectBrand(brand, btn) {
  activeBrand = brand;
  activeGender = 'all';
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('genderBar').classList.add('visible');
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-gender="all"]').classList.add('active');
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('searchResultsSection').classList.remove('visible');
  document.getElementById('searchInput').value = '';
  renderPerfumes();
}

function filterGender(gender, btn) {
  activeGender = gender;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPerfumes();
}

function renderPerfumes() {
  const section = document.getElementById('perfumeSection');
  const grid = document.getElementById('perfumeGrid');
  const nameEl = document.getElementById('selectedBrandName');
  const countEl = document.getElementById('countLabel');

  if (!activeBrand) { section.classList.remove('visible'); return; }

  section.classList.add('visible');
  nameEl.textContent = activeBrand;

  const brandData = data[activeBrand] || {};
  let items = [];

  const genders = activeGender === 'all'
    ? ['women','men','unisex']
    : [activeGender];

  genders.forEach(g => {
    if (brandData[g]) {
      brandData[g].forEach(name => items.push({ name, gender: g }));
    }
  });

  countEl.textContent = items.length + (items.length === 1 ? ' model' : items.length < 5 ? ' modele' : ' modeli');

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state">Brak perfum w tej kategorii</div>';
    return;
  }

  grid.innerHTML = items.map(({ name, gender }) => `
    <div class="perfume-card">
      <div class="perfume-name">${name}</div>
      ${genderLabel(gender)}
      <div class="shop-links">
        <a class="shop-link" href="${douglasLink(activeBrand, name)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M1 6h10"/></svg>
          Douglas
        </a>
        <a class="shop-link" href="${sephoraLink(activeBrand, name)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M1 6h10"/></svg>
          Sephora
        </a>
      </div>
    </div>
  `).join('');
}

function goBack() {
  activeBrand = null;
  activeGender = 'all';
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('genderBar').classList.remove('visible');
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('perfumeSection').classList.remove('visible');
  document.getElementById('searchResultsSection').classList.remove('visible');
  document.getElementById('searchInput').value = '';
}

// SEARCH
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    document.getElementById('searchResultsSection').classList.remove('visible');
    if (activeBrand) document.getElementById('perfumeSection').classList.add('visible');
    return;
  }

  document.getElementById('perfumeSection').classList.remove('visible');
  const resultsSection = document.getElementById('searchResultsSection');
  const searchGrid = document.getElementById('searchGrid');
  resultsSection.classList.add('visible');

  let results = [];
  Object.entries(data).forEach(([brand, genders]) => {
    Object.entries(genders).forEach(([gender, names]) => {
      names.forEach(name => {
        if (name.toLowerCase().includes(q) || brand.toLowerCase().includes(q)) {
          results.push({ brand, name, gender });
        }
      });
    });
  });

  if (results.length === 0) {
    searchGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Nie znaleziono perfum dla „' + q + '"</div>';
    return;
  }

  searchGrid.innerHTML = results.map(({ brand, name, gender }) => `
    <div class="perfume-card">
      <div style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">${brand}</div>
      <div class="perfume-name">${name}</div>
      ${genderLabel(gender)}
      <div class="shop-links">
        <a class="shop-link" href="${douglasLink(brand, name)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M1 6h10"/></svg>
          Douglas
        </a>
        <a class="shop-link" href="${sephoraLink(brand, name)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M1 6h10"/></svg>
          Sephora
        </a>
      </div>
    </div>
  `).join('');
});

renderBrands();
</script>
